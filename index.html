<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071625" />
  <title>REBUS Messenger</title>
  <meta name="description" content="REBUS Messenger — захищений звʼязок у надійному контурі." />
  <link rel="icon" href="assets/icons/rebus-mark.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/images/desktop/login-bg-1920.webp" as="image" media="(min-width: 769px)" />
  <link rel="preload" href="assets/images/mobile/login-bg-mobile-1080.webp" as="image" media="(max-width: 768px)" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="login-page" aria-label="REBUS Messenger стартова сторінка">
    <div class="login-bg" aria-hidden="true"></div>
    <div class="ambient ambient-red" aria-hidden="true"></div>
    <div class="ambient ambient-blue" aria-hidden="true"></div>

    <section class="login-shell">
      <div class="brand-card" aria-label="REBUS Messenger">
        <img class="brand-mark" src="assets/icons/rebus-mark.svg" alt="" />
        <div class="brand-copy">
          <p class="eyebrow">REBUS ECOSYSTEM</p>
          <h1>REBUS<br /><span>Messenger</span></h1>
          <p class="tagline">Захищений звʼязок. Надійний контур.</p>
        </div>
      </div>

      <button class="enter-button" type="button" id="enterButton" aria-label="Увійти до REBUS Messenger">
        <span>Увійти</span>
      </button>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
