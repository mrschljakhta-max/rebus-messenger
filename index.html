<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020711" />
  <title>REBUS Messenger</title>
  <meta name="description" content="REBUS Messenger — захищений звʼязок у надійному контурі." />
  <link rel="icon" href="assets/icons/rebus-mark.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/images/desktop/login-bg-1920.webp" as="image" media="(min-width: 769px)" />
  <link rel="preload" href="assets/images/mobile/login-bg-mobile-1080.webp" as="image" media="(max-width: 768px)" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="login-page" aria-label="REBUS Messenger стартова сторінка">
    <div class="login-bg" aria-hidden="true"></div>
    <div class="login-vignette" aria-hidden="true"></div>

    <button class="enter-button" type="button" id="enterButton" aria-label="Увійти до REBUS Messenger">
      <span>Вхід</span>
    </button>

    <section class="connect-layer" id="connectLayer" aria-live="polite" aria-hidden="true">
      <div class="connect-panel">
        <div class="connect-mark" aria-hidden="true">
          <span></span>
        </div>
        <p class="connect-kicker">REBUS Messenger</p>
        <h1>Підключення до REBUS…</h1>
        <p class="connect-text" id="connectText">Перевірка доступу</p>
        <div class="connect-progress" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
